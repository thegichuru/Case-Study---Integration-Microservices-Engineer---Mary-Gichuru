apiVersion: apps/v1
kind: Deployment
metadata:
  name: case-study
  namespace: case-study
  labels:
    app: case-study
spec:
  replicas: 2
  selector:
    matchLabels:
      app: case-study
  template:
    metadata:
      labels:
        app: case-study
    spec:
      containers:
        - name: case-study
          image: case-study:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: case-study-config
            - secretRef:
                name: case-study-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

